services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ollive
      POSTGRES_USER: ollive
      POSTGRES_PASSWORD: ollive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -U ollive
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 5s

volumes:
  postgres_data:
