name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ollive
          POSTGRES_USER: ollive
          POSTGRES_PASSWORD: ollive
        ports: ["5432:5432"]
        options: --health-cmd="pg_isready -U ollive" --health-interval=5s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd="redis-cli ping" --health-interval=5s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Type check
        working-directory: backend
        run: uv run python -m pyright --version || uv add --dev pyright && uv run pyright app/

      - name: Lint
        working-directory: backend
        run: uv run python -m ruff check app/ || uv add --dev ruff && uv run ruff check app/

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ollive:ollive@localhost:5432/ollive
          REDIS_URL: redis://localhost:6379
        run: uv run alembic upgrade head

      - name: Import check
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ollive:ollive@localhost:5432/ollive
          REDIS_URL: redis://localhost:6379
        run: uv run python -c "from app.main import app; print('✓ Backend imports OK')"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      - name: Type check
        working-directory: frontend
        run: bun run tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: bun run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: bun run build
